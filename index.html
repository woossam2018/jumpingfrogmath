<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개구리 징검다리 건너기</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Canvas Confetti (폭죽 효과) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Jua', sans-serif;
            background-color: #f0fdf4; 
            touch-action: none; /* 태블릿 풀화면 제스처 방지 */
            overflow: hidden; /* 스크롤바 방지 */
        }

        .pond-bg {
            background: linear-gradient(180deg, #bae6fd 0%, #7dd3fc 100%);
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.05);
        }

        .stone {
            background-color: #4ade80;
            box-shadow: 0 8px 0 #16a34a, 0 15px 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        
        .stone-question {
            background-color: #ffffff;
            border: 4px dashed #4ade80;
            box-shadow: 0 8px 0 #d1d5db, 0 15px 10px rgba(0,0,0,0.1);
            color: #22c55e;
            animation: pulse-question 1.5s infinite;
        }

        @keyframes pulse-question {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.05) translateY(-5px); }
        }

        .jump-anim {
            animation: jump 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @keyframes jump {
            0% { transform: translateY(0) scale(1) translateX(-50%); }
            50% { transform: translateY(-80px) scale(1.1) translateX(-50%); }
            100% { transform: translateY(0) scale(1) translateX(-50%); }
        }

        .shake-anim {
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        /* 말풍선이 숫자를 가리지 않도록 위치 위로 조정 */
        .ribbit-bubble {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 24px;
            color: #16a34a;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            opacity: 0;
            pointer-events: none;
            z-index: 30;
            white-space: nowrap;
        }
        .ribbit-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }
        .show-ribbit {
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, 0) scale(0.8); }
            100% { opacity: 0; transform: translate(-50%, -40px) scale(1); }
        }

        .btn-choice {
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-choice:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 transparent !important;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col bg-[#f0fdf4] py-4 md:py-8 px-4 md:px-12 relative">

    <!-- 홈 버튼: 화면 제일 우측 하단 고정 -->
    <button id="btn-home" onclick="resetGame()" class="hidden fixed bottom-4 right-4 md:bottom-8 md:right-8 bg-white hover:bg-green-50 text-green-700 text-lg font-bold py-2 px-4 md:py-3 md:px-6 rounded-full shadow-[0_4px_0_#86efac] border-4 border-green-300 z-[100] flex items-center gap-2 active:translate-y-1 active:shadow-none transition-all">
        <span>🏠</span> 처음으로
    </button>

    <!-- 고정 헤더 -->
    <div class="w-full text-center z-10 flex-shrink-0 mb-2 md:mb-4">
        <h1 id="main-title" class="text-3xl md:text-4xl lg:text-5xl text-green-600 drop-shadow-sm font-bold">🐸 개구리 징검다리 건너기 🐸</h1>
    </div>

    <!-- 메인 게임 영역 (연못) -->
    <div class="relative w-full max-w-7xl mx-auto flex-1 pond-bg rounded-[2rem] md:rounded-[3rem] overflow-hidden border-4 md:border-8 border-blue-200 shadow-xl">
        
        <!-- 물결 장식 -->
        <div class="absolute top-10 left-10 w-20 h-4 border-b-4 border-blue-300 rounded-[50%] opacity-50"></div>
        <div class="absolute top-32 right-20 w-32 h-4 border-b-4 border-blue-300 rounded-[50%] opacity-50"></div>

        <!-- 징검다리 트랙 -->
        <div id="track" class="absolute top-0 h-full flex items-start transition-transform duration-500 ease-in-out" style="left: 50%; transform: translateX(0);">
            
            <!-- 출발지 (풀밭) -->
            <div id="start-block" class="w-32 md:w-40 lg:w-48 h-full bg-green-500 rounded-r-[4rem] border-r-8 border-green-600 flex-shrink-0 flex items-start pt-8 md:pt-12 justify-end pr-6 md:pr-8">
                <span class="text-2xl md:text-3xl lg:text-4xl text-green-100 font-bold">출발!</span>
            </div>
            
            <!-- 징검다리 공간 (4개 이상 확보를 위한 간격 조절) -->
            <div id="stones-container" class="relative flex items-start gap-[60px] md:gap-[75px] lg:gap-[90px] pl-[60px] md:pl-[75px] lg:pl-[90px] pr-20 h-full">
                <!-- +숫자 표시 -->
                <div id="floating-plus" class="absolute top-[80px] md:top-[100px] lg:top-[120px] flex items-center justify-center w-[60px] md:w-[75px] lg:w-[90px] -translate-y-1/2 opacity-0 transition-all duration-500 z-20 pointer-events-none">
                    <span class="animate-bounce text-4xl md:text-4xl lg:text-5xl text-orange-500 font-black drop-shadow-[0_2px_4px_rgba(0,0,0,0.2)]"></span>
                </div>
            </div>
            
            <!-- 도착지 (풀밭) -->
            <div id="finish-line" class="w-32 md:w-40 lg:w-48 h-full bg-green-500 rounded-l-[4rem] border-l-8 border-green-600 flex-shrink-0 flex items-start pt-8 md:pt-12 justify-start pl-6 md:pl-8 hidden">
                <span class="text-2xl md:text-3xl lg:text-4xl text-yellow-300 font-bold">도착! 🎉</span>
            </div>
        </div>

        <!-- 중앙 고정 개구리 -->
        <div id="frog" class="absolute bottom-2 md:bottom-6 text-[4rem] md:text-[5rem] lg:text-[6.5rem] z-20 origin-bottom" style="left: 50%; transform: translateX(-50%);">
            🐸
            <div id="ribbit-text" class="ribbit-bubble">개굴!</div>
        </div>
    </div>

    <!-- 통합 하단 컨트롤 패널 -->
    <div class="w-full max-w-5xl mx-auto h-[130px] md:h-[150px] lg:h-[180px] mt-2 md:mt-4 relative flex-shrink-0">
        
        <!-- 1. 난이도 선택 화면 -->
        <div id="panel-start" class="absolute inset-0 flex flex-col items-center justify-center transition-opacity duration-300">
            <p class="text-lg md:text-xl lg:text-2xl text-gray-700 mb-3 font-bold">어떤 숫자로 뛰어세기를 해볼까요?</p>
            <div class="flex flex-wrap justify-center gap-2 md:gap-4" id="difficulty-buttons">
                <!-- JS로 자동 생성 -->
            </div>
        </div>

        <!-- 2. 게임 진행 화면 -->
        <div id="panel-game" class="absolute inset-0 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
            <h2 id="question-text" class="text-xl md:text-2xl lg:text-3xl text-gray-800 mb-3 md:mb-5 bg-white py-2 px-6 rounded-full shadow-sm border-2 border-green-300 inline-block">
                다음 징검다리의 숫자는? <span class="text-sm md:text-lg lg:text-xl text-green-600 ml-2">(+뛰어세기를 해봐요!)</span>
            </h2>
            <div id="choices" class="flex justify-center gap-4 md:gap-8">
                <!-- 선택지 버튼 -->
            </div>
        </div>

        <!-- 3. 결과 화면 -->
        <div id="panel-result" class="absolute inset-0 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
            <h2 class="text-2xl md:text-3xl lg:text-4xl text-green-600 mb-4 animate-bounce font-bold">대단해요! 모두 건넜어요! 🎉</h2>
            <button onclick="resetGame()" class="text-xl md:text-2xl lg:text-3xl bg-yellow-400 hover:bg-yellow-300 text-yellow-900 py-3 md:py-4 px-10 rounded-full shadow-[0_6px_0_#ca8a04] active:shadow-[0_0px_0_#ca8a04] active:translate-y-[6px] transition-all border-4 border-yellow-200 font-bold">
                다른 숫자로 또 하기
            </button>
        </div>
    </div>

    <script>
        // Web Audio API를 이용한 개구리 효과음 생성 함수
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playRibbit() {
            if(audioCtx.state === 'suspended') { audioCtx.resume(); }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(250, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        let currentMultiplier = 0;
        let currentStep = 0; 
        const totalSteps = 10;
        let isAnimating = false;

        const btnHome = document.getElementById('btn-home');
        const mainTitle = document.getElementById('main-title');
        const track = document.getElementById('track');
        const stonesContainer = document.getElementById('stones-container');
        const floatingPlus = document.getElementById('floating-plus');
        const startBlock = document.getElementById('start-block');
        const frog = document.getElementById('frog');
        const ribbitText = document.getElementById('ribbit-text');
        const finishLine = document.getElementById('finish-line');
        const difficultyButtons = document.getElementById('difficulty-buttons');
        const choicesDiv = document.getElementById('choices');

        function showPanel(panelId) {
            ['panel-start', 'panel-game', 'panel-result'].forEach(id => {
                const el = document.getElementById(id);
                if (id === panelId) {
                    el.classList.remove('opacity-0', 'pointer-events-none');
                    el.classList.add('opacity-100');
                } else {
                    el.classList.remove('opacity-100');
                    el.classList.add('opacity-0', 'pointer-events-none');
                }
            });
        }

        function init() {
            difficultyButtons.innerHTML = '';
            for (let i = 2; i <= 9; i++) {
                const btn = document.createElement('button');
                btn.className = 'bg-white hover:bg-green-100 text-green-600 text-xl md:text-2xl lg:text-3xl font-bold py-2 md:py-3 px-4 md:px-6 rounded-full border-4 border-green-300 shadow-[0_4px_0_#86efac] active:translate-y-1 active:shadow-none transition-all';
                btn.innerText = `${i}씩`;
                btn.onclick = () => startGame(i);
                difficultyButtons.appendChild(btn);
            }
            showPanel('panel-start');
        }

        function startGame(multiplier) {
            // 첫 상호작용 시 오디오 컨텍스트 활성화 (브라우저 정책 대응)
            if(audioCtx.state === 'suspended') { audioCtx.resume(); }

            currentMultiplier = multiplier;
            currentStep = 0;
            isAnimating = false;

            mainTitle.innerText = `🐸 개구리 ${multiplier}씩 뛰어 징검다리 건너기 🐸`;

            btnHome.classList.remove('hidden'); 
            finishLine.classList.remove('hidden');
            showPanel('panel-game');

            createStones();
            updateVisuals();
            generateChoices();
        }

        function createStones() {
            Array.from(stonesContainer.children).forEach(child => {
                if(child.id !== 'floating-plus') stonesContainer.removeChild(child);
            });

            for (let i = 1; i <= totalSteps; i++) {
                const wrapper = document.createElement('div');
                wrapper.id = `wrapper-${i}`;
                wrapper.className = 'relative flex-shrink-0 flex flex-col items-center mt-8 md:mt-10 lg:mt-12';

                const stone = document.createElement('div');
                stone.id = `stone-${i}`;
                stone.className = 'stone flex-shrink-0 w-[90px] h-[90px] md:w-[100px] md:h-[100px] lg:w-[130px] lg:h-[130px] rounded-full flex items-center justify-center text-4xl md:text-4xl lg:text-5xl text-white font-bold opacity-30 z-10';
                
                wrapper.appendChild(stone);
                stonesContainer.appendChild(wrapper);
            }
        }

        function updateVisuals() {
            for (let i = 1; i <= totalSteps; i++) {
                const stone = document.getElementById(`stone-${i}`);
                if (!stone) continue;

                if (i <= currentStep) {
                    stone.className = 'stone flex-shrink-0 w-[90px] h-[90px] md:w-[100px] md:h-[100px] lg:w-[130px] lg:h-[130px] rounded-full flex items-center justify-center text-4xl md:text-4xl lg:text-5xl text-white font-bold z-10 relative';
                    stone.innerText = currentMultiplier * i;
                } else if (i === currentStep + 1) {
                    stone.className = 'stone-question flex-shrink-0 w-[90px] h-[90px] md:w-[100px] md:h-[100px] lg:w-[130px] lg:h-[130px] rounded-full flex items-center justify-center text-5xl md:text-5xl lg:text-6xl font-bold z-10 relative';
                    stone.innerText = '?';
                } else {
                    stone.className = 'stone flex-shrink-0 w-[90px] h-[90px] md:w-[100px] md:h-[100px] lg:w-[130px] lg:h-[130px] rounded-full flex items-center justify-center bg-green-200 opacity-40 z-10 relative';
                    stone.innerText = '';
                }
            }

            let offset = 0;
            if (currentStep === 0) {
                offset = startBlock.offsetWidth - 40; 
            } else {
                const currentWrapper = document.getElementById(`wrapper-${currentStep}`);
                offset = stonesContainer.offsetLeft + currentWrapper.offsetLeft + (currentWrapper.offsetWidth / 2);
            }
            track.style.transform = `translateX(-${offset}px)`;

            let plusLeft = 0;
            if (currentStep === 0) {
                plusLeft = startBlock.offsetWidth;
            } else {
                const currentWrapper = document.getElementById(`wrapper-${currentStep}`);
                plusLeft = currentWrapper.offsetLeft + currentWrapper.offsetWidth;
            }
            
            floatingPlus.style.left = `${plusLeft}px`;
            floatingPlus.querySelector('span').innerText = `+${currentMultiplier}`;
            floatingPlus.style.opacity = currentStep < totalSteps ? '1' : '0';
        }

        function generateChoices() {
            choicesDiv.innerHTML = '';
            
            if (currentStep >= totalSteps) {
                gameComplete();
                return;
            }

            const nextStep = currentStep + 1;
            const targetAnswer = currentMultiplier * nextStep;
            
            let options = new Set([targetAnswer]);
            while (options.size < 3) {
                let diff = Math.floor(Math.random() * 5) - 2; 
                let fake = targetAnswer + (diff * currentMultiplier > 0 ? diff * currentMultiplier : diff);
                if (fake > 0 && !options.has(fake)) {
                    options.add(fake);
                }
            }

            const shuffled = Array.from(options).sort(() => Math.random() - 0.5);

            shuffled.forEach(num => {
                const btn = document.createElement('button');
                btn.className = 'btn-choice bg-blue-500 hover:bg-blue-400 text-white text-4xl md:text-4xl lg:text-5xl font-bold w-20 h-20 md:w-24 md:h-24 lg:w-28 lg:h-28 rounded-full shadow-[0_6px_0_#1d4ed8] border-4 border-blue-300 flex items-center justify-center';
                btn.innerText = num;
                btn.onclick = () => handleChoice(num, targetAnswer, btn);
                choicesDiv.appendChild(btn);
            });
        }

        function handleChoice(selectedVal, targetVal, btnElement) {
            if (isAnimating) return;

            if (selectedVal === targetVal) {
                isAnimating = true;
                
                playRibbit(); // 소리 재생
                
                currentStep++;
                frog.classList.add('jump-anim');
                ribbitText.classList.add('show-ribbit');
                
                setTimeout(() => updateVisuals(), 250);

                setTimeout(() => {
                    frog.classList.remove('jump-anim');
                    ribbitText.classList.remove('show-ribbit');
                    isAnimating = false;
                    generateChoices();
                }, 600);

            } else {
                btnElement.classList.add('bg-red-400', 'shadow-[0_8px_0_#b91c1c]', 'border-red-300');
                btnElement.classList.remove('bg-blue-500', 'shadow-[0_6px_0_#1d4ed8]', 'border-blue-300');
                btnElement.classList.add('shake-anim');
                
                const targetStone = document.getElementById(`stone-${currentStep + 1}`);
                if (targetStone) targetStone.classList.add('shake-anim');

                setTimeout(() => {
                    btnElement.classList.remove('shake-anim', 'bg-red-400', 'shadow-[0_8px_0_#b91c1c]', 'border-red-300');
                    btnElement.classList.add('bg-blue-500', 'shadow-[0_6px_0_#1d4ed8]', 'border-blue-300');
                    if (targetStone) targetStone.classList.remove('shake-anim');
                }, 400);
            }
        }

        function gameComplete() {
            showPanel('panel-result');
            floatingPlus.style.opacity = '0'; 
            
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);

                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);

            frog.style.transform = 'translateX(-50%) translateY(-20px) scale(1.2)';
            setTimeout(() => { frog.style.transform = 'translateX(-50%)'; }, 500);
        }

        function resetGame() {
            btnHome.classList.add('hidden');
            finishLine.classList.add('hidden');
            mainTitle.innerText = `🐸 개구리 징검다리 건너기 🐸`;
            track.style.transform = 'translateX(0px)'; 
            floatingPlus.style.opacity = '0';
            
            Array.from(stonesContainer.children).forEach(child => {
                if(child.id !== 'floating-plus') stonesContainer.removeChild(child);
            });
            init(); 
        }

        window.onload = init;
    </script>
</body>
</html>
